# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — GitHub Actions
#
# Stages:
#   1. test        → Install dependencies & run Jest tests
#   2. build-push  → Build Docker image & push to Docker Hub
#   3. deploy      → Apply Kubernetes manifests to the cluster
#
# Triggers:
#   • Every push to the `main` branch
#   • Every pull request targeting `main`
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Global environment variables — override in repo Settings › Secrets
env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cicd-pipeline-demo
  KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Test ─────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js 18 with npm cache for speed
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      # 3. Install all dependencies (including devDependencies for tests)
      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      # 4. Run the Jest test suite with coverage
      - name: Run tests
        working-directory: ./app
        run: npm test

      # 5. Upload coverage report as a build artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

  # ── Job 2: Build & Push Docker Image ────────────────────────────────────────
  build-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                     # Only runs if the test job passes
    if: github.ref == 'refs/heads/main'   # Only on pushes to main (not PRs)

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Extract metadata (tags, labels) for the Docker image.
      # Produces tags like: latest, sha-<short-sha>, 1.0.0
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      # Set up QEMU for multi-platform builds (arm64 + amd64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx (enables advanced build features & caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to Docker Hub using repository secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build the image for linux/amd64 and linux/arm64, then push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching — speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Kubernetes ──────────────────────────────────────────────
  deploy:
    name: ☸️  Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push              # Only runs after a successful image push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Write the base64-encoded kubeconfig from Secrets to a file
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Update the image tag in the deployment manifest to the new SHA tag.
      # This ensures Kubernetes pulls the exact image built in this pipeline run.
      - name: Update image tag in deployment manifest
        run: |
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          sed -i "s|image: .*|image: ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}|g" \
            k8s/deployment.yaml
          echo "Deploying image: ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}"

      # Apply Kubernetes manifests (deployment + service)
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # Wait until the rollout finishes (or timeout after 120s)
      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/cicd-pipeline-demo \
            --namespace=default \
            --timeout=120s

      # Print final pod and service status to the workflow log
      - name: Verify deployment
        run: |
          echo "──── Pods ────────────────────────────────"
          kubectl get pods -l app=cicd-pipeline-demo -o wide
          echo "──── Services ────────────────────────────"
          kubectl get services cicd-pipeline-demo-service
